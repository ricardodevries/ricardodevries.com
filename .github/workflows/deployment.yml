name: "Deployment"

on:
  push:
    branches: [main]

concurrency:
  group: deployment
  cancel-in-progress: false

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - name: "Checkout repository"
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

      - name: "Set up Node.js"
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f
        with:
          node-version: 24
          cache: "npm"

      - name: "Install dependencies"
        run: npm ci --no-audit --no-fund

      - name: "Build"
        run: npm run build
        env:
          ASTRO_DB_REMOTE_URL: ${{ vars.ASTRO_DB_REMOTE_URL }}

      - name: "Archive build artifacts"
        run: tar -czf build.tar.gz dist/ db/config.ts package.json package-lock.json

      - name: "Upload build artifact"
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f
        with:
          name: ${{ github.sha }}
          path: build.tar.gz

  deploy:
    name: Deployment
    needs: build
    runs-on: production
    environment:
      name: production
      url: https://ricardodevries.com
    steps:
      - name: "Download build artifact"
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c
        with:
          name: ${{ github.sha }}

      - name: "Set up Node.js"
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f
        with:
          node-version: 24

      - name: "Extract build artifact"
        run: |
          mkdir -p /var/www/releases/${{ github.sha }}
          tar -xzf build.tar.gz -C /var/www/releases/${{ github.sha }}
          rm build.tar.gz

      - name: "Install dependencies"
        working-directory: /var/www/releases/${{ github.sha }}
        run: npm ci --no-audit --no-fund

      - name: "Verify database schema is up to date"
        working-directory: /var/www/releases/${{ github.sha }}
        id: verify
        env:
          ASTRO_DB_REMOTE_URL: ${{ vars.ASTRO_DB_REMOTE_URL }}
        run: |
          set -uo pipefail
          set +e
          output=$(npx astro db verify 2>&1)
          exit_code=$?
          set -e

          printf '%s\n' "$output"

          if [ "$exit_code" -ne 0 ]; then
            exit "$exit_code"
          fi

          if printf '%s' "$output" | grep -Fq 'Database schema is up to date.'; then
            echo 'needs_push=false' >> "$GITHUB_OUTPUT"
            exit 0
          fi

          if printf '%s' "$output" | grep -Fq 'Database schema is out of date.'; then
            echo 'needs_push=true' >> "$GITHUB_OUTPUT"
            exit 0
          fi

          echo 'Unexpected output from astro db verify' >&2
          exit 1

      - name: "Push database migrations"
        working-directory: /var/www/releases/${{ github.sha }}
        if: steps.verify.outputs.needs_push == 'true'
        env:
          ASTRO_DB_REMOTE_URL: ${{ vars.ASTRO_DB_REMOTE_URL }}
        run: npx astro db push --remote

      - name: "Activate release"
        run: sudo /usr/bin/ln -sfnT /var/www/releases/${{ github.sha }} /var/www/current

      - name: "Restart service"
        run: sudo systemctl restart ricardodevries-web.service

      - name: "Prune old releases"
        run: ls -1dt /var/www/releases/*/ | tail -n +4 | xargs -r rm -rf

      - name: "Delete build artifact"
        uses: geekyeggo/delete-artifact@176a747ab7e287e3ff4787bf8a148716375ca118
        with:
          name: ${{ github.sha }}
